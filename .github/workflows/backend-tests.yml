name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'pytest.ini'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'pytest.ini'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DEBUG: 'True'
          SECRET_KEY: 'ci-secret-key-nao-usar-em-producao'
        run: python -m pytest tests/ -v --no-migrations
